<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - Chili Leaf Disease Detection</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body style="
    background: url('{{ url_for('static', filename='background4.jpg') }}') no-repeat center center fixed;
    background-size: cover;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
">

<!-- Overlay -->
<div style="background-color: rgba(0,0,0,0.5); padding: 20px; border-radius: 15px;">

<div class="card shadow-lg p-5" style="width: 400px; border-radius: 15px;">

    <h2 class="text-center text-success mb-4">
        🌿 Create Account
    </h2>

    <!-- SIGNUP FORM -->
    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control"
                   placeholder="Enter username" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>

            <div class="input-group">
                <input type="password"
                       name="password"
                       id="signupPassword"
                       class="form-control"
                       placeholder="Enter password"
                       required>

                <span class="input-group-text" style="cursor:pointer;"
                      onclick="toggleSignupPassword()">
                    <i class="bi bi-eye" id="signupEyeIcon"></i>
                </span>
            </div>
        </div>

        <!-- PASSWORD RULES -->
        <div id="password-rules" style="font-size:14px;">
            <p id="length" class="text-danger">❌ Minimum 8 characters</p>
            <p id="lower" class="text-danger">❌ Lowercase letter</p>
            <p id="upper" class="text-danger">❌ Capital letter</p>
            <p id="number" class="text-danger">❌ Number</p>
            <p id="special" class="text-danger">❌ Special character</p>
        </div>

        <div class="d-grid mb-3 mt-3">
            <button type="submit" class="btn btn-success btn-lg">
                Register
            </button>
        </div>

        <div class="text-center">
            <p>Already have an account?</p>
            <a href="/" class="btn btn-outline-success w-100">
                Back to Login
            </a>
        </div>

    </form>

</div>
</div>

<script>
// SHOW / HIDE PASSWORD
function toggleSignupPassword() {
    var passwordField = document.getElementById("signupPassword");
    var eyeIcon = document.getElementById("signupEyeIcon");

    if (passwordField.type === "password") {
        passwordField.type = "text";
        eyeIcon.classList.remove("bi-eye");
        eyeIcon.classList.add("bi-eye-slash");
    } else {
        passwordField.type = "password";
        eyeIcon.classList.remove("bi-eye-slash");
        eyeIcon.classList.add("bi-eye");
    }
}

// PASSWORD VALIDATION
const password = document.getElementById("signupPassword");

password.onkeyup = function () {
    const val = password.value;

    updateRule("length", val.length >= 8, "Minimum 8 characters");
    updateRule("lower", /[a-z]/.test(val), "Lowercase letter");
    updateRule("upper", /[A-Z]/.test(val), "Capital letter");
    updateRule("number", /[0-9]/.test(val), "Number");
    updateRule("special", /[!@#$%^&*]/.test(val), "Special character");
};

function updateRule(id, condition, text) {
    let element = document.getElementById(id);

    if (condition) {
        element.className = "text-success";
        element.innerHTML = "✅ " + text;
    } else {
        element.className = "text-danger";
        element.innerHTML = "❌ " + text;
    }
}
</script>

</body>
</html>
